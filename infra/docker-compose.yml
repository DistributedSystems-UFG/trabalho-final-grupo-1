services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: collabdocs
      POSTGRES_USER: collabdocs
      POSTGRES_PASSWORD: collabdocs
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./postgres/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collabdocs"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: collabdocs
      RABBITMQ_DEFAULT_PASS: collabdocs
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  java-backend:
    build:
      context: ../java/backend
    restart: unless-stopped
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/collabdocs
      SPRING_DATASOURCE_USERNAME: collabdocs
      SPRING_DATASOURCE_PASSWORD: collabdocs
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: collabdocs
      SPRING_RABBITMQ_PASSWORD: collabdocs
      JWT_SECRET: ${JWT_SECRET:-collabdocs-dev-secret-key-32chars!!}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  go-collab:
    build:
      context: ../go/collab-service
    restart: unless-stopped
    environment:
      PORT: 8080
      JAVA_BACKEND_URL: http://java-backend:8081
      RABBITMQ_URL: amqp://collabdocs:collabdocs@rabbitmq:5672/
      JWT_SECRET: ${JWT_SECRET:-collabdocs-dev-secret-key-32chars!!}
    ports:
      - "8080:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      java-backend:
        condition: service_started

  frontend:
    build:
      context: ../frontend
    restart: unless-stopped
    ports:
      - "4000:80"
    depends_on:
      - go-collab

volumes:
  postgres_data:
  rabbitmq_data:
