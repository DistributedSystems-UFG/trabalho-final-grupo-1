server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver; resolve upstream at request time
    # so nginx doesn't fail to start when go-collab is temporarily down.
    resolver 127.0.0.11 valid=10s;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API e WebSocket para o serviço Go (prefixo /api/ removido antes de encaminhar)
    location ~ ^/api/(.*)$ {
        set $upstream go-collab:8080;
        set $path $1;
        proxy_pass         http://$upstream/$path$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }
}
