upstream go_collab_upstream {
    server go-collab:8080 max_fails=1 fail_timeout=10s;
    server go-collab-2:8080 max_fails=1 fail_timeout=10s;
}

server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location /assets/ {
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-store" always;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API e WebSocket para o serviço Go (prefixo /api/ removido antes de encaminhar)
    location ~ ^/api/(.*)$ {
        set $path $1;
        proxy_pass         http://go_collab_upstream/$path$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # gRPC-Web analytics endpoint. Browser calls /grpc/...; Envoy translates it
    # to native HTTP/2 gRPC for the Java backend.
    location ~ ^/grpc/(.*)$ {
        set $grpc_upstream grpc-web:8082;
        proxy_pass         http://$grpc_upstream/grpc/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
