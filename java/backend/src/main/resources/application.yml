spring:
  application:
    name: collabdocs-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/collabdocs}
    username: ${SPRING_DATASOURCE_USERNAME:collabdocs}
    password: ${SPRING_DATASOURCE_PASSWORD:collabdocs}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:collabdocs}
    password: ${SPRING_RABBITMQ_PASSWORD:collabdocs}

server:
  port: ${SERVER_PORT:8081}

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9090}

jwt:
  secret: ${JWT_SECRET:collabdocs-dev-secret-32chars!!}
  expiration-ms: 86400000
